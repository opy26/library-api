<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0f1e; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        h1 { color: #4f8ef7; text-align: center; margin-bottom: 40px; }
        .cards { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background-color: #0d1526; border: 1px solid #4f8ef7; border-radius: 15px; padding: 25px; width: 300px; }
        .card h3 { color: #4f8ef7; margin-bottom: 10px; }
        .card p { color: #aaaaaa; }
    </style>
</head>
<body>
    <h1>📚 Library System</h1>
    <div class="cards" id="books-container"></div>
    <script>
        fetch('http://localhost:3000/books')
        .then(res => res.json())
        .then(books => {
            const container = document.getElementById('books-container');
            books.forEach(book => {
                container.innerHTML += `
                    <div class="card">
                        <h3>${book.title}</h3>
                        <p>Author: ${book.author}</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
